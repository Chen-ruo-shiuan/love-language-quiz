<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愛之語測驗</title>
<style>
  :root {
    --orange:   #C4622D;
    --orange-lt:#E07A48;
    --gray-dk:  #2C2C2C;
    --gray-md:  #6B6B6B;
    --gray-lt:  #AEAAA6;
    --border:   #E0DEDB;
    --bg:       #F2F1EF;
    --card:     #FFFFFF;
    --text:     #2C2C2C;
    --shadow:   rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif TC', 'Georgia', serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
  }

  /* ── Layout ── */
  #app {
    max-width: 640px;
    margin: 0 auto;
    padding: 40px 20px 64px;
  }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn .35s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Page header ── */
  .page-header {
    margin-bottom: 36px;
  }
  .page-header .label {
    font-size: .75rem;
    letter-spacing: .14em;
    color: var(--orange);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .page-header h1 {
    font-size: 1.75rem;
    color: var(--gray-dk);
    letter-spacing: .03em;
    line-height: 1.35;
    font-weight: normal;
  }
  .page-header p {
    margin-top: 10px;
    color: var(--gray-md);
    font-size: .92rem;
    line-height: 1.7;
  }
  .page-header.centered { text-align: center; }

  /* ── Divider ── */
  .divider {
    width: 36px; height: 2px;
    background: var(--orange);
    margin: 14px 0 0;
  }
  .centered .divider { margin: 14px auto 0; }

  /* ── Card ── */
  .card {
    background: var(--card);
    border-radius: 10px;
    padding: 28px 26px;
    box-shadow: 0 2px 16px var(--shadow);
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }

  /* ── Button ── */
  .btn {
    display: inline-block;
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 13px 32px;
    font-size: .92rem;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: .08em;
    transition: background .15s, transform .1s;
    text-decoration: none;
  }
  .btn:hover { background: var(--orange-lt); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn.outline {
    background: transparent;
    border: 1.5px solid var(--gray-lt);
    color: var(--gray-md);
  }
  .btn.outline:hover { border-color: var(--orange); color: var(--orange); background: transparent; }
  .btn-row { margin-top: 20px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  /* ── Input ── */
  label.field-label {
    display: block;
    font-size: .8rem;
    letter-spacing: .08em;
    color: var(--gray-md);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  input[type=text] {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    font-size: .95rem;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color .2s;
  }
  input[type=text]:focus { border-color: var(--orange); }

  /* ── Lang list on start screen ── */
  .lang-list {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-top: 1px solid var(--border);
    padding-top: 18px;
  }
  .lang-list-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: .88rem;
    color: var(--gray-md);
  }
  .lang-list-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--orange);
    flex-shrink: 0;
  }

  /* ── Progress ── */
  #progress-wrap { margin-bottom: 24px; }
  #progress-label {
    font-size: .78rem;
    letter-spacing: .06em;
    color: var(--gray-lt);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }
  #progress-bar-bg {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: var(--orange);
    border-radius: 99px;
    transition: width .4s ease;
  }

  /* ── Question ── */
  .question-title {
    font-size: 1rem;
    line-height: 1.75;
    color: var(--gray-dk);
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .options { display: flex; flex-direction: column; gap: 8px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 13px 16px;
    cursor: pointer;
    background: var(--card);
    transition: border-color .18s, background .18s;
    font-size: .92rem;
    line-height: 1.55;
    color: var(--gray-md);
  }
  .option:hover { border-color: var(--orange); color: var(--gray-dk); }
  .option.selected {
    border-color: var(--orange);
    background: #FBF3EE;
    color: var(--gray-dk);
  }
  .option-letter {
    flex-shrink: 0;
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1px solid var(--border);
    color: var(--gray-lt);
    display: flex; align-items: center; justify-content: center;
    font-size: .75rem;
    font-style: normal;
    transition: border-color .18s, background .18s, color .18s;
  }
  .option.selected .option-letter {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
  }

  /* ── Nav buttons ── */
  #nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 22px; gap: 10px; }
  #btn-prev { visibility: hidden; }
  #btn-prev.show { visibility: visible; }

  /* ── Result ── */
  .result-type-block {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 24px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
  }
  .result-icon {
    width: 64px; height: 64px;
    border-radius: 10px;
    background: #FBF3EE;
    border: 1px solid #EDD5C5;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }
  .result-type-block h2 { font-size: 1.4rem; color: var(--gray-dk); font-weight: normal; margin-bottom: 4px; }
  .result-type-block .sub { font-size: .82rem; color: var(--orange); letter-spacing: .06em; }

  .result-desc {
    font-size: .93rem;
    line-height: 1.85;
    color: var(--gray-md);
    margin-bottom: 24px;
  }

  .score-bars { margin-bottom: 8px; }
  .score-section-label {
    font-size: .75rem;
    letter-spacing: .1em;
    color: var(--gray-lt);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: .83rem; }
  .score-row .lang-name { width: 80px; flex-shrink: 0; color: var(--gray-md); }
  .score-row .bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .score-row .bar-fill { height: 100%; background: var(--orange); border-radius: 99px; transition: width 1s ease; }
  .score-row .score-num { width: 20px; text-align: right; color: var(--orange); font-weight: bold; font-size: .82rem; }

  /* ── Admin ── */
  .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .badge {
    font-size: .72rem;
    letter-spacing: .06em;
    background: #FBF3EE;
    color: var(--orange);
    border: 1px solid #EDD5C5;
    border-radius: 4px;
    padding: 2px 9px;
    margin-left: 8px;
  }

  table { width: 100%; border-collapse: collapse; font-size: .87rem; }
  th {
    background: var(--bg);
    color: var(--gray-md);
    padding: 10px 12px;
    text-align: left;
    font-weight: normal;
    letter-spacing: .06em;
    font-size: .78rem;
    text-transform: uppercase;
    border-bottom: 2px solid var(--border);
  }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  .lang-tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 4px;
    font-size: .8rem;
    border: 1px solid var(--border);
    color: var(--gray-md);
    background: var(--bg);
  }
  .tag-W, .tag-T, .tag-G, .tag-S, .tag-P { background: #FBF3EE; border-color: #EDD5C5; color: var(--orange); }

  .admin-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .admin-controls input { flex: 1; min-width: 140px; }

  .empty-msg { text-align: center; padding: 48px 0; color: var(--gray-lt); font-size: .9rem; letter-spacing: .04em; }

  /* ── Numpad ── */
  .npbtn {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card);
    color: var(--gray-dk);
    font-size: 1.2rem;
    font-family: inherit;
    padding: 16px 0;
    cursor: pointer;
    transition: background .12s, transform .1s;
  }
  .npbtn:hover { background: var(--bg); }
  .npbtn:active { transform: scale(.96); }
  .pw-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 1.5px solid var(--gray-lt);
    background: transparent;
    transition: background .2s, border-color .2s;
    display: inline-block;
  }
  .pw-dot.filled { background: var(--orange); border-color: var(--orange); }

  /* ── Footer tap ── */
  .secret-tap { cursor: pointer; user-select: none; color: transparent; font-size: 8px; }

  /* ── Toaster ── */
  #toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--gray-dk); color: #fff;
    padding: 10px 22px; border-radius: 6px;
    font-size: .88rem; opacity: 0;
    transition: all .3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
    letter-spacing: .04em;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <!-- ══════════════════ SCREEN: START ══════════════════ -->
  <div id="screen-start" class="screen active">
    <div class="page-header">
      <div class="label">Love Language Quiz</div>
      <h1>你的愛之語<br>是什麼？</h1>
      <div class="divider"></div>
      <p style="margin-top:14px;">每個人表達和接收情感的方式都不同<br>10 道題，找出你在關係中最渴望的連結方式</p>
    </div>

    <div class="card">
      <label class="field-label">你的名稱</label>
      <input type="text" id="input-name" placeholder="請輸入姓名或暱稱" maxlength="20" />

      <div class="lang-list">
        <div class="lang-list-item"><span class="dot"></span>💬 肯定的言語</div>
        <div class="lang-list-item"><span class="dot"></span>⏰ 精心的時刻</div>
        <div class="lang-list-item"><span class="dot"></span>🎁 接受禮物</div>
        <div class="lang-list-item"><span class="dot"></span>🤝 服務的行動</div>
        <div class="lang-list-item"><span class="dot"></span>🤗 身體的接觸</div>
      </div>
    </div>

    <div class="btn-row" style="justify-content:flex-start;">
      <button class="btn" onclick="startQuiz()">開始測驗 →</button>
    </div>

    <p style="text-align:center;margin-top:48px;font-size:.7rem;color:var(--border);letter-spacing:.3em;cursor:default;" id="secret-trigger" onclick="adminTap()">●●●</p>
  </div>

  <!-- ══════════════════ SCREEN: QUIZ ══════════════════ -->
  <div id="screen-quiz" class="screen">
    <div id="progress-wrap">
      <div id="progress-label">
        <span>愛之語測驗</span>
        <span id="progress-text">1 / 10</span>
      </div>
      <div id="progress-bar-bg"><div id="progress-bar" style="width:10%"></div></div>
    </div>

    <div class="card">
      <div class="question-title" id="q-title"></div>
      <div class="options" id="q-options"></div>
    </div>

    <div id="nav-row">
      <button class="btn outline" id="btn-prev" onclick="prevQ()">← 上一題</button>
      <button class="btn" id="btn-next" onclick="nextQ()">下一題 →</button>
    </div>
  </div>

  <!-- ══════════════════ SCREEN: RESULT ══════════════════ -->
  <div id="screen-result" class="screen">
    <div class="page-header">
      <div class="label">Result</div>
      <h1>測驗結果</h1>
      <div class="divider"></div>
    </div>

    <div class="card">
      <div class="result-type-block">
        <div class="result-icon" id="r-emoji"></div>
        <div>
          <div class="sub" id="r-sub"></div>
          <h2 id="r-title"></h2>
        </div>
      </div>
      <div class="result-desc" id="r-desc"></div>
      <div class="score-section-label">各項分佈</div>
      <div class="score-bars" id="r-bars"></div>
    </div>

    <div class="btn-row" style="justify-content:flex-start;">
      <button class="btn" onclick="resetQuiz()">再測一次</button>
      <button class="btn outline" onclick="copyResult()">複製結果</button>
    </div>
  </div>

  <!-- ══════════════════ SCREEN: PASSWORD ══════════════════ -->
  <div id="screen-password" class="screen">
    <div class="page-header centered">
      <div class="label">Staff Only</div>
      <h1>工作人員專區</h1>
      <div class="divider"></div>
      <p style="margin-top:12px;">請輸入後台密碼</p>
    </div>

    <div class="card" style="max-width:300px;margin:0 auto;">
      <div id="pw-dots" style="display:flex;justify-content:center;gap:16px;margin-bottom:24px;">
        <span class="pw-dot"></span><span class="pw-dot"></span>
        <span class="pw-dot"></span><span class="pw-dot"></span>
      </div>

      <div id="numpad" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
        <button class="npbtn" onclick="pwInput('1')">1</button>
        <button class="npbtn" onclick="pwInput('2')">2</button>
        <button class="npbtn" onclick="pwInput('3')">3</button>
        <button class="npbtn" onclick="pwInput('4')">4</button>
        <button class="npbtn" onclick="pwInput('5')">5</button>
        <button class="npbtn" onclick="pwInput('6')">6</button>
        <button class="npbtn" onclick="pwInput('7')">7</button>
        <button class="npbtn" onclick="pwInput('8')">8</button>
        <button class="npbtn" onclick="pwInput('9')">9</button>
        <button class="npbtn" onclick="pwClear()" style="font-size:.78rem;color:var(--gray-md)">清除</button>
        <button class="npbtn" onclick="pwInput('0')">0</button>
        <button class="npbtn" onclick="pwDelete()">⌫</button>
      </div>

      <div id="pw-error" style="text-align:center;color:var(--orange);font-size:.82rem;margin-top:14px;min-height:20px;letter-spacing:.04em;"></div>
    </div>

    <div class="btn-row" style="margin-top:20px;">
      <button class="btn outline" onclick="showScreen('screen-start')">取消</button>
    </div>
  </div>

  <!-- ══════════════════ SCREEN: ADMIN ══════════════════ -->
  <div id="screen-admin" class="screen">
    <div class="page-header">
      <div class="label">Dashboard</div>
      <h1>活動紀錄</h1>
      <div class="divider"></div>
    </div>

    <div class="card">
      <div class="admin-header">
        <div style="font-size:.92rem;color:var(--gray-dk);">
          測驗記錄
          <span class="badge" id="admin-count">0 筆</span>
        </div>
        <button class="btn outline" style="padding:8px 16px;font-size:.82rem" onclick="showScreen('screen-start')">← 返回</button>
      </div>

      <div class="admin-controls">
        <input type="text" id="admin-search" placeholder="搜尋姓名…" oninput="renderTable()" />
        <button class="btn outline" style="padding:9px 16px;font-size:.82rem" onclick="exportCSV()">匯出 CSV</button>
        <button class="btn outline" style="padding:9px 16px;font-size:.82rem;border-color:#E0DEDB;color:#AEAAA6" onclick="clearAll()">清空</button>
      </div>

      <div id="admin-table-wrap"></div>
    </div>
  </div>

</div><!-- #app -->

<div id="toast"></div>

<script>
// ══════════════════════════════════
//  DATA — Questions & Love Language info
// ══════════════════════════════════

const LANGS = {
  W: { name: '肯定的言語', emoji: '💬', color: '#fde8d0',
       desc: '你最渴望透過「言語」感受到愛。真誠的讚美、鼓勵的話語、說出心裡的感謝，對你而言比任何禮物都珍貴。來自家人的一句「你辛苦了」或「我愛你」，就能讓你充滿力量。' },
  T: { name: '精心的時刻', emoji: '⏰', color: '#d0f0e8',
       desc: '你最看重「專心陪伴」。不是人在心不在，而是對方放下手機、全神貫注地和你在一起。共同的回憶、一起做的事、眼神交流，都是你感到被愛的來源。' },
  G: { name: '接受禮物',   emoji: '🎁', color: '#f0d8f5',
       desc: '對你來說，禮物代表著心意與記憶。不一定要貴重，但那份「我想到了你」的用心讓你深受感動。精心挑選的小禮物、節日的驚喜，都讓你感到無比溫暖。' },
  S: { name: '服務的行動', emoji: '🤝', color: '#d8edf5',
       desc: '行動說的比話語更大聲！對你而言，對方願意為你做事、主動分擔、默默付出，就是最有力的愛的表達。幫你做家事、處理難題，都讓你感到被重視和珍愛。' },
  P: { name: '身體的接觸', emoji: '🤗', color: '#fddce0',
       desc: '你透過肢體接觸感受到最深刻的愛。一個擁抱、牽手、輕拍肩膀，都讓你感到安全與被愛。這不只是身體上的親近，更是心靈上最直接的連結。' },
};

const QUESTIONS = [
  {
    q: '當你感到最被愛、最被重視時，通常是因為什麼？',
    opts: [
      { text: '對方說了讚美、感謝或鼓勵你的話', lang: 'W' },
      { text: '對方放下其他事情，專心陪在你身邊', lang: 'T' },
      { text: '對方在特別時刻送了你驚喜或禮物', lang: 'G' },
      { text: '對方默默幫你把某件事情處理好', lang: 'S' },
      { text: '對方給了你一個擁抱或溫暖的肢體接觸', lang: 'P' },
    ]
  },
  {
    q: '哪種行為最能讓你感到窩心？',
    opts: [
      { text: '收到一封對方真心寫給你的訊息或手寫卡片', lang: 'W' },
      { text: '對方特地空出時間，只為了好好陪你', lang: 'T' },
      { text: '收到一份精心挑選、符合你喜好的小禮物', lang: 'G' },
      { text: '對方主動幫你解決你一直在煩惱的事', lang: 'S' },
      { text: '對方走過來輕輕拍你肩膀或牽起你的手', lang: 'P' },
    ]
  },
  {
    q: '在你低落或特別疲憊的時候，什麼最能安慰你？',
    opts: [
      { text: '聽到「你辛苦了」「你真的做得很好」', lang: 'W' },
      { text: '有人靜靜地坐在你身旁，什麼都不用說', lang: 'T' },
      { text: '突然收到一份小禮物或你最喜歡的食物', lang: 'G' },
      { text: '有人幫你把讓你頭痛的事情都處理好', lang: 'S' },
      { text: '有人給你一個緊緊的擁抱', lang: 'P' },
    ]
  },
  {
    q: '你覺得一段關係裡最珍貴的是什麼？',
    opts: [
      { text: '彼此常常表達感謝、欣賞和真誠的肯定', lang: 'W' },
      { text: '有高品質的相處時光，專心投入、不被打擾', lang: 'T' },
      { text: '記得彼此的喜好，偶爾有驚喜和小禮物', lang: 'G' },
      { text: '願意為對方付出行動，分擔辛勞和壓力', lang: 'S' },
      { text: '自然的肢體接觸讓彼此感到安心和親近', lang: 'P' },
    ]
  },
  {
    q: '什麼時刻最讓你有「對方真的在乎我」的感覺？',
    opts: [

// ══════════════════════════════════
//  STATE
// ══════════════════════════════════
let userName = '';
let currentQ = 0;
let answers  = new Array(QUESTIONS.length).fill(null); // stores lang key
let adminTapCount = 0;
let adminTapTimer  = null;

// ══════════════════════════════════
//  SCREENS
// ══════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════
//  START
// ══════════════════════════════════
function startQuiz() {
  const raw = document.getElementById('input-name').value.trim();
  if (!raw) { toast('請先輸入你的姓名或暱稱 😊'); return; }
  userName = raw;
  currentQ = 0;
  answers  = new Array(QUESTIONS.length).fill(null);
  renderQuestion();
  showScreen('screen-quiz');
}

// ══════════════════════════════════
//  QUIZ RENDER
// ══════════════════════════════════
function renderQuestion() {
  const q   = QUESTIONS[currentQ];
  const idx = currentQ + 1;
  const total = QUESTIONS.length;

  document.getElementById('progress-text').textContent = `${idx} / ${total}`;
  document.getElementById('progress-bar').style.width   = `${(idx / total) * 100}%`;

  document.getElementById('q-title').textContent = `Q${idx}. ${q.q}`;

  const letters = ['Ａ','Ｂ','Ｃ','Ｄ','Ｅ'];
  const wrap = document.getElementById('q-options');
  wrap.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (answers[currentQ] === opt.lang ? ' selected' : '');
    div.innerHTML = `<div class="option-letter">${letters[i]}</div><div>${opt.text}</div>`;
    div.onclick = () => selectOption(opt.lang, div, wrap);
    wrap.appendChild(div);
  });

  // prev / next buttons
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  prev.classList.toggle('show', currentQ > 0);
  next.textContent = currentQ === QUESTIONS.length - 1 ? '查看結果 →' : '下一題 →';
}

function selectOption(lang, el, wrap) {
  answers[currentQ] = lang;
  wrap.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

function nextQ() {
  if (answers[currentQ] === null) { toast('請選擇一個選項 😊'); return; }
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    finishQuiz();
  }
}

function prevQ() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
}

// ══════════════════════════════════
//  FINISH & RESULT
// ══════════════════════════════════
function finishQuiz() {
  const scores = { W:0, T:0, G:0, S:0, P:0 };
  answers.forEach(a => { if (a) scores[a]++; });

  const topKey = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const lang   = LANGS[topKey];

  document.getElementById('r-emoji').textContent = lang.emoji;
  document.getElementById('r-title').textContent = lang.name;
  document.getElementById('r-sub').textContent   = `${userName} 的愛之語`;
  document.getElementById('r-desc').textContent  = lang.desc;

  // Score bars
  const barsEl = document.getElementById('r-bars');
  barsEl.innerHTML = '';
  const maxScore = Math.max(...Object.values(scores)) || 1;
  Object.entries(LANGS).forEach(([k, v]) => {
    const row = document.createElement('div');
    row.className = 'score-row';
    const pct = (scores[k] / QUESTIONS.length * 100).toFixed(0);
    row.innerHTML = `
      <div class="lang-name">${v.emoji} ${v.name.replace('的','\n的')}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:0%" data-w="${pct}"></div></div>
      <div class="score-num">${scores[k]}</div>`;
    barsEl.appendChild(row);
  });

  // animate bars after render
  setTimeout(() => {
    barsEl.querySelectorAll('.bar-fill').forEach(b => {
      b.style.width = b.dataset.w + '%';
    });
  }, 100);

  showScreen('screen-result');

  // save record (wrapped so a storage error never blocks the result screen)
  try {
    saveRecord({ name: userName, lang: topKey, scores, date: new Date().toISOString() });
  } catch(e) {
    console.warn('儲存記錄失敗:', e);
  }
}

// ══════════════════════════════════
//  CONFIG — 填入你的 Google Apps Script 網址
// ══════════════════════════════════
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyqeewHEqjmwK_9DavL_XIz5EmZ9ZO8qnbEoJzh-EoFO1SugKF9zsbfEjErbDkeBJb0Kg/exec';

// ══════════════════════════════════
//  STORAGE
// ══════════════════════════════════
const STORE_KEY = 'love_lang_records_v1';

function loadRecords() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
  catch { return []; }
}

function saveRecord(rec) {
  // 1. 本地備份
  try {
    const records = loadRecords();
    records.push(rec);
    localStorage.setItem(STORE_KEY, JSON.stringify(records));
  } catch(e) {
    console.warn('localStorage 失敗:', e);
  }

  // 2. 送到 Google Sheets（如果有設定網址）
  if (SHEETS_URL) {
    const params = new URLSearchParams({
      name:  rec.name,
      lang:  LANGS[rec.lang].name,
      emoji: LANGS[rec.lang].emoji,
      W: rec.scores.W, T: rec.scores.T, G: rec.scores.G,
      S: rec.scores.S, P: rec.scores.P,
      date:  rec.date
    });
    fetch(`${SHEETS_URL}?${params}`, { mode: 'no-cors' })
      .catch(e => console.warn('Sheets 同步失敗:', e));
  }
}

// ══════════════════════════════════
//  ADMIN PASSWORD
// ══════════════════════════════════
const ADMIN_PASSWORD = '1234'; // ← 在這裡修改後台密碼
let pwBuffer = '';

function adminTap() {
  adminTapCount++;
  clearTimeout(adminTapTimer);
  adminTapTimer = setTimeout(() => adminTapCount = 0, 1500);
  if (adminTapCount >= 5) {
    adminTapCount = 0;
    pwBuffer = '';
    updateDots();
    document.getElementById('pw-error').textContent = '';
    showScreen('screen-password');
  }
}

function pwInput(digit) {
  if (pwBuffer.length >= 4) return;
  pwBuffer += digit;
  updateDots();
  if (pwBuffer.length === 4) {
    setTimeout(checkPassword, 200);
  }
}

function pwDelete() {
  pwBuffer = pwBuffer.slice(0, -1);
  updateDots();
}

function pwClear() {
  pwBuffer = '';
  updateDots();
}

function updateDots() {
  document.querySelectorAll('.pw-dot').forEach((d, i) => {
    d.classList.toggle('filled', i < pwBuffer.length);
  });
}

function checkPassword() {
  if (pwBuffer === ADMIN_PASSWORD) {
    renderTable();
    showScreen('screen-admin');
  } else {
    document.getElementById('pw-error').textContent = '密碼錯誤，請再試一次';
    pwBuffer = '';
    updateDots();
  }
}

function openAdmin() {
  renderTable();
  showScreen('screen-admin');
}

function renderTable() {
  const records = loadRecords();
  const search  = (document.getElementById('admin-search')?.value || '').trim().toLowerCase();
  const filtered = search ? records.filter(r => r.name.toLowerCase().includes(search)) : records;

  document.getElementById('admin-count').textContent = `${records.length} 筆`;

  const wrap = document.getElementById('admin-table-wrap');
  if (!filtered.length) {
    wrap.innerHTML = '<div class="empty-msg">目前還沒有測驗紀錄<br>快讓客人來測試吧 🌸</div>';
    return;
  }

  const rows = [...filtered].reverse().map((r, i) => {
    const d = new Date(r.date);
    const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    const lang = LANGS[r.lang];
    return `<tr>
      <td>${filtered.length - i}</td>
      <td><b>${esc(r.name)}</b></td>
      <td><span class="lang-tag tag-${r.lang}">${lang.emoji} ${lang.name}</span></td>
      <td style="font-size:.8rem;color:#b08898">${dateStr}</td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table>
    <thead><tr><th>#</th><th>姓名</th><th>愛之語</th><th>時間</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function exportCSV() {
  const records = loadRecords();
  if (!records.length) { toast('還沒有紀錄'); return; }
  const header = '姓名,愛之語,時間\n';
  const rows = [...records].reverse().map(r => {
    const d = new Date(r.date);
    return `"${r.name}","${LANGS[r.lang].name}","${d.toLocaleString('zh-TW')}"`;
  }).join('\n');
  const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `愛之語測驗紀錄_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.csv`;
  a.click();
}

function clearAll() {
  if (!confirm('確定要清空所有紀錄嗎？此動作無法復原。')) return;
  localStorage.removeItem(STORE_KEY);
  renderTable();
  toast('已清空所有紀錄');
}

// ══════════════════════════════════
//  UTILITIES
// ══════════════════════════════════
function resetQuiz() {
  document.getElementById('input-name').value = '';
  showScreen('screen-start');
}

function copyResult() {
  const title = document.getElementById('r-title').textContent;
  const desc  = document.getElementById('r-desc').textContent;
  const text  = `【愛之語測驗結果】\n${userName} 的愛之語是：${title}\n\n${desc}`;
  navigator.clipboard.writeText(text).then(() => toast('已複製到剪貼簿 ✓')).catch(() => toast('複製失敗，請手動選取'));
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
